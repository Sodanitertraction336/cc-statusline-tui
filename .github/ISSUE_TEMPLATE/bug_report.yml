name: Bug Report
description: Report a bug in claude-statusline-config
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Minimal steps to reproduce the issue.
      placeholder: |
        1. Run `npx claude-statusline-config`
        2. Select ...
        3. ...
    validations:
      required: true

  - type: textarea
    id: behavior
    attributes:
      label: Expected vs Actual Behavior
      description: What you expected to happen and what actually happened.
      placeholder: |
        Expected: ...
        Actual: ...
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: "e.g., macOS 15.2, Ubuntu 24.04"
    validations:
      required: true

  - type: input
    id: install-method
    attributes:
      label: Install Method
      placeholder: "npm / brew / cargo"
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      description: Output of `claude-statusline-config --version`
      placeholder: "e.g., 2.1.7"
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Paste the contents of `~/.claude/statusline/statusline.log` if available.
      render: text
    validations:
      required: false
